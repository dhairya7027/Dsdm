<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Stats</title>
  <link rel="stylesheet" href="stats.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <main>
    <section class="hero">
      <div>
        <h1>Application Stats</h1>
        <p>Track applied companies by date and daily pace</p>
      </div>
      <button class="btn tertiary" id="backBtn">Back To Dashboard</button>
    </section>

    <section class="stats-grid">
      <article class="stat-card">
        <div class="stat-label">Applied Today</div>
        <div class="stat-value" id="appliedTodayCount">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Last 7 Days</div>
        <div class="stat-value" id="applied7DayCount">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Unique Companies</div>
        <div class="stat-value" id="uniqueCompaniesCount">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Total Apply Events</div>
        <div class="stat-value" id="totalEventsCount">0</div>
      </article>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Daily Applications (All Time)</h2>
      </div>
      <div id="dailyBars" class="daily-bars"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Date-wise Breakdown</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Applied Companies</th>
              <th>Companies</th>
            </tr>
          </thead>
          <tbody id="dailyTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Recent Apply History</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date Time</th>
              <th>Company</th>
              <th>Domain</th>
            </tr>
          </thead>
          <tbody id="recentTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="stats.js"></script>
</body>
</html>
